<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>DESIGN.md Generator for Sketch - TypeUI</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-top">
        <div class="brand">
          <img src="../logo.svg" alt="TypeUI logo" class="logo" />
          <div class="brand-copy">
            <h1>DESIGN.md Generator - TypeUI</h1>
            <p class="description-top">
              Automatically extracts local Sketch style guidelines and creates editable DESIGN.md and SKILL.md drafts. Built by TypeUI.
            </p>
          </div>
        </div>
        <a href="#" id="repoLink" class="repo-link repo-link-top">
          <span class="github-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 .5A12 12 0 0 0 8.2 23.9c.6.1.8-.3.8-.6v-2.2c-3.4.7-4.1-1.4-4.1-1.4-.5-1.3-1.3-1.7-1.3-1.7-1.1-.8.1-.8.1-.8 1.2.1 1.8 1.2 1.8 1.2 1 1.8 2.7 1.2 3.3.9.1-.8.4-1.2.7-1.5-2.7-.3-5.6-1.4-5.6-6a4.7 4.7 0 0 1 1.2-3.2c-.1-.3-.5-1.5.1-3.1 0 0 1-.3 3.3 1.2A11.3 11.3 0 0 1 12 6.6c1 0 2 .1 3 .4 2.3-1.5 3.3-1.2 3.3-1.2.6 1.6.2 2.8.1 3.1a4.7 4.7 0 0 1 1.2 3.2c0 4.6-2.9 5.7-5.6 6 .4.4.8 1 .8 2.1v3.1c0 .3.2.7.8.6A12 12 0 0 0 12 .5Z"/>
            </svg>
          </span>
          <span id="versionText">v0.0.0</span>
        </a>
      </div>
    </header>

    <section class="switcher-row">
      <div class="switcher" role="tablist" aria-label="Markdown type switcher">
        <button class="switcher-btn is-active" id="tabDesign" data-tab="design" role="tab" aria-selected="true">DESIGN.md</button>
        <button class="switcher-btn" id="tabSkill" data-tab="skill" role="tab" aria-selected="false">SKILL.md</button>
      </div>
      <div class="stats-line" id="statsLine">Waiting for extraction...</div>
    </section>

    <section class="editor-wrap">
      <div class="editor-actions">
        <button class="action-btn" id="copyButton">Copy</button>
        <button class="action-btn" id="downloadButton">Download</button>
        <button class="action-btn action-refresh" id="refreshButton">Refresh</button>
      </div>
      <textarea id="markdownEditor" spellcheck="false" aria-label="Editable markdown content"></textarea>
      <div class="token-meta-overlay" id="tokenMeta">No token stats yet.</div>
    </section>

    <footer class="footer">
      <p class="description-bottom">
        Find more <a href="#" id="designSkillsLink">curated design skills</a>
        and improve UI generation with AI at
        <a href="#" id="typeUiLink">TypeUI</a>.
      </p>
    </footer>
  </div>
  <script src="../resources_webview.js"></script>
</body>
</html>
